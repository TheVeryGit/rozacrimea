backend:
  name: git-gateway
  repo: TheVeryGit/rozacrimea
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/47abf005-fb08-47a5-9a46-3387e179c849/pkce
  auth_token_endpoint: /sites/47abf005-fb08-47a5-9a46-3387e179c849/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://rozacrimea.ru

media_folder: public/images
public_folder: /images

collections:
  - name: settings
    label: Основные настройки
    files:
      - name: content
        label: Контент сайта
        file: content.json
        format: json
        fields:
          - label: Главный экран
            name: hero
            widget: object
            fields:
              - {label: Заголовок, name: title, widget: string}
              - {label: Подзаголовок, name: subtitle, widget: string}
              - {label: Телефон, name: phone, widget: string}
              - {label: WhatsApp, name: whatsapp, widget: string}
              - {label: Фото фона, name: image, widget: image, required: false}
          - label: Апартаменты
            name: apartments
            widget: list
            fields:
              - {label: Название, name: name, widget: string}
              - {label: Описание, name: description, widget: text}
              - {label: Цена, name: price, widget: string}
              - {label: Площадь, name: area, widget: string}
              - {label: Вместимость, name: guests, widget: string}
              - label: Фотографии
                name: photos
                widget: list
                field: {label: Фото, name: photo, widget: image}
              - label: Удобства
                name: amenities
                widget: list
                field: {label: Удобство, name: amenity, widget: string}
          - label: Акция
            name: promo
            widget: object
            fields:
              - {label: Включить акцию, name: active, widget: boolean, default: false}
              - {label: Текст акции, name: text, widget: string, required: false}
