backend:
  name: github
  repo: TheVeryGit/rozacrimea
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: settings
    label: Основные настройки
    files:
      - name: content
        label: Контент сайта
        file: content.json
        format: json
        fields:
          - label: Главный экран
            name: hero
            widget: object
            fields:
              - {label: Заголовок, name: title, widget: string}
              - {label: Подзаголовок, name: subtitle, widget: string}
              - {label: Телефон, name: phone, widget: string}
              - {label: WhatsApp, name: whatsapp, widget: string}
              - {label: Фото фона, name: image, widget: image, required: false}
          - label: Апартаменты
            name: apartments
            widget: list
            fields:
              - {label: Название, name: name, widget: string}
              - {label: Описание, name: description, widget: text}
              - {label: Цена, name: price, widget: string}
              - {label: Площадь, name: area, widget: string}
              - {label: Вместимость, name: guests, widget: string}
              - label: Фотографии
                name: photos
                widget: list
                field: {label: Фото, name: photo, widget: image}
              - label: Удобства
                name: amenities
                widget: list
                field: {label: Удобство, name: amenity, widget: string}
          - label: Акция
            name: promo
            widget: object
            fields:
              - {label: Включить акцию, name: active, widget: boolean, default: false}
              - {label: Текст акции, name: text, widget: string, required: false}
